[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway Dashboard'da "daily-score" servisi için ayarlar:
#   Root Directory : backend/
#   Start Command  : python cron_runner.py
#   Cron Schedule  : 0 16 * * 1-5    (Pzt–Cum 16:00 UTC = 19:00 TR)
#   Env vars       : FASTAPI_URL, FIREBASE_CREDENTIALS_JSON, ADMIN_KEY (opsiyonel)
#
# cron_runner.py her gün finansal skor yazar;
# ayın 1'inde ek olarak /admin/calibrate da çağırır.
